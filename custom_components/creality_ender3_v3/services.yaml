send_gcode:
  name: Send G-code
  description: Send one or more raw G-code commands to the printer through Moonraker.
  fields:
    entity_id:
      name: Entity
      description: Any entity belonging to the target Creality Ender-3 V3 device.
      required: true
      selector:
        entity:
          integration: creality_ender3_v3
    command:
      name: Command
      description: A single G-code command, or multiple commands separated by newlines.
      example: G28
      selector:
        text:
          multiline: true
    commands:
      name: Commands
      description: A list of G-code commands to send in order.
      example:
        - M104 S200
        - M140 S60
      selector:
        object:
